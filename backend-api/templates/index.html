<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 to-green-300 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

        <h1 class="text-2xl font-bold text-center text-green-700 mb-6">
            Plant Disease Detection
        </h1>

        <!-- FORM SUBMISSION (NO JS) -->
        <form action="/predict" method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="file"
                required
                class="w-full border p-3 rounded-xl mb-4"
            />

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold"
            >
                Predict Disease
            </button>

        </form>

    </div>

</body>
</html>
